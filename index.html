<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Profitable Contribution — a vanilla-JavaScript calculator that finds the bank deposit with the highest projected return for your initial amount, monthly top-ups, term and currency.">
        <meta name="author" content="Elkhan Isayev">
        <meta name="theme-color" content="#0f766e">
        <link rel="stylesheet" href="css/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
        <title>Profitable Contribution — Deposit Selector</title>
    </head>
    <body>
        <div class="main-wrapper">
            <header>
                <h1>Profitable Contribution</h1>
                <p class="subtitle">Find the deposit with the highest projected return</p>
                <h2><span class="star">&#9733;</span> Required fields</h2>
            </header>

            <main>
                <form autocomplete="off" id="deposit-form" novalidate>

                    <div class="header-via-input">
                        <label class="input-header" for="initial-amount">
                            Initial amount<span class="star"><sup>&#9733;</sup></span>
                        </label>
                        <input type="number" min="0" required value="0" id="initial-amount" inputmode="numeric">
                    </div>

                    <div class="header-via-input">
                        <label class="input-header" for="amount-of-monthly-replenishment">
                            Monthly top-up<span class="star"><sup>&#9733;</sup></span>
                        </label>
                        <input type="number" min="0" required value="0" id="amount-of-monthly-replenishment" inputmode="numeric">
                    </div>

                    <div class="header-via-input">
                        <label class="input-header" for="deposit-term">
                            Term (months)<span class="star"><sup>&#9733;</sup></span>
                        </label>
                        <input type="number" min="1" step="1" required value="0" id="deposit-term" inputmode="numeric">
                    </div>

                    <div class="header-via-input">
                        <label class="input-header" for="deposit-currency">
                            Currency<span class="star"><sup>&#9733;</sup></span>
                        </label>
                        <input type="text" required placeholder="RUB / USD" id="deposit-currency" list="currencies">
                        <datalist id="currencies">
                            <option value="RUB"></option>
                            <option value="USD"></option>
                        </datalist>
                    </div>

                </form>
            </main>

            <footer>
                <div class="footer-button-via-copyright">
                    <button class="button-style" id="select-button" type="submit" form="deposit-form">Find deposits</button>
                    <span class="copyright">&#169; <span class="copyright-year"></span> Elkhan Isayev</span>
                </div>
                <div class="error-list-wrapper">
                    <ol id="error-list"></ol>
                </div>
            </footer>
        </div>

        <div class="table-wrapper" id="table-wrapper"></div>

        <script src="js/data.js"></script>
        <script src="js/script.js"></script>
    </body>
</html>
